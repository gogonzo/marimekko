url: ~

template:
  bootstrap: 5
  bootswatch: cosmo
  bslib:
    primary: "#2B6CB0"
    border-radius: 0.3rem
    btn-border-radius: 0.3rem

home:
  title: "marimekko: marimekko and Mosaic Plots for ggplot2"
  logo:
    src: man/figures/logo.svg
    alt: "marimekko logo"
  description: >
    Create marimekko (mosaic) plots as native ggplot2 layers.
    Column widths encode marginal proportions and segment heights encode
    conditional proportions.

navbar:
  structure:
    left:  [intro, reference, articles]
    right: [search, github]
  components:
    intro:
      text: Get started
      href: articles/getting-started.html
    articles:
      text: Articles
      menu:
        - text: Getting started
          href: articles/getting-started.html
        - text: Advanced features
          href: articles/advanced-features.html
        - text: Migration from ggmosaic to marimekko
          href: articles/migration-from-ggmosaic-to-marimekko.html

reference:
  - title: "Plot layers"
    desc: >
      Core geom and stat functions for building marimekko plots.
    contents:
      - geom_marimekko
      - geom_marimekko_text
      - geom_marimekko_label
      - StatMarimekkoTiles

  - title: "Utilities"
    desc: >
      Helper functions for data extraction and theming.
    contents:
      - fortify_marimekko
      - marimekko_pal
      - theme_marimekko

articles:
  - title: "Tutorials"
    navbar: ~
    contents:
      - getting-started
      - advanced-features
      - migration-from-ggmosaic-to-marimekko
