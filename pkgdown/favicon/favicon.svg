<svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" width="181" height="209"><svg viewBox="0 0 181 209" width="181" height="209">
  <defs>
    <clipPath id="hex">
      <polygon points="90.5,0 181,52.25 181,156.75 90.5,209 0,156.75 0,52.25"></polygon>
    </clipPath>
    <style>
      @keyframes fadeIn1 { 0% { opacity: 0; transform: scale(0.85); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes fadeIn2 { 0%, 8% { opacity: 0; transform: scale(0.85); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes fadeIn3 { 0%, 16% { opacity: 0; transform: scale(0.85); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes fadeIn4 { 0%, 24% { opacity: 0; transform: scale(0.85); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes fadeIn5 { 0%, 32% { opacity: 0; transform: scale(0.85); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes fadeIn6 { 0%, 40% { opacity: 0; transform: scale(0.85); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes fadeIn7 { 0%, 48% { opacity: 0; transform: scale(0.85); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes fadeIn8 { 0%, 56% { opacity: 0; transform: scale(0.85); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes fadeIn9 { 0%, 64% { opacity: 0; transform: scale(0.85); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes fadeIn10 { 0%, 72% { opacity: 0; transform: scale(0.85); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes fadeIn11 { 0%, 80% { opacity: 0; transform: scale(0.85); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.82; } }
      .tile { stroke: #FAF9F6; stroke-width: 1.5; }
      .t1  { animation: fadeIn1  1.4s ease-out forwards; }
      .t2  { animation: fadeIn2  1.4s ease-out forwards; }
      .t3  { animation: fadeIn3  1.4s ease-out forwards; }
      .t4  { animation: fadeIn4  1.4s ease-out forwards; }
      .t5  { animation: fadeIn5  1.4s ease-out forwards; }
      .t6  { animation: fadeIn6  1.4s ease-out forwards; }
      .t7  { animation: fadeIn7  1.4s ease-out forwards; }
      .t8  { animation: fadeIn8  1.4s ease-out forwards; }
      .t9  { animation: fadeIn9  1.4s ease-out forwards; }
      .t10 { animation: fadeIn10 1.4s ease-out forwards; }
      .t11 { animation: fadeIn11 1.4s ease-out forwards; }
      .glow { animation: pulse 3s ease-in-out infinite 1.8s; }
    </style>
  </defs>

  <!-- Hex outline -->
  <polygon points="90.5,0 181,52.25 181,156.75 90.5,209 0,156.75 0,52.25" fill="none" stroke="#264653" stroke-width="3"></polygon>

  <!-- Mosaic tiles clipped to hex shape -->
  <g clip-path="url(#hex)">
    <!-- Background -->
    <rect width="181" height="209" fill="#FAF9F6"></rect>

    <!-- Column 1: x=0, w=46 -->
    <rect class="tile t1 glow" x="0" y="0" width="46" height="75" fill="#E03C31"></rect>
    <rect class="tile t3" x="0" y="75" width="46" height="55" fill="#1D3557"></rect>
    <rect class="tile t6" x="0" y="130" width="46" height="79" fill="#E9C46A"></rect>

    <!-- Column 2: x=46, w=38 -->
    <rect class="tile t2" x="46" y="0" width="38" height="50" fill="#2A6041"></rect>
    <rect class="tile t4 glow" x="46" y="50" width="38" height="68" fill="#D4668E"></rect>
    <rect class="tile t7" x="46" y="118" width="38" height="42" fill="#264653"></rect>
    <rect class="tile t10" x="46" y="160" width="38" height="49" fill="#F4A261"></rect>

    <!-- Column 3: x=84, w=42 -->
    <rect class="tile t3" x="84" y="0" width="42" height="62" fill="#F4A261"></rect>
    <rect class="tile t5" x="84" y="62" width="42" height="52" fill="#E03C31"></rect>
    <rect class="tile t8 glow" x="84" y="114" width="42" height="95" fill="#1D3557"></rect>

    <!-- Column 4: x=126, w=55 -->
    <rect class="tile t4" x="126" y="0" width="55" height="85" fill="#E9C46A"></rect>
    <rect class="tile t6" x="126" y="85" width="55" height="45" fill="#2A6041"></rect>
    <rect class="tile t9" x="126" y="130" width="55" height="79" fill="#D4668E"></rect>
  </g>

  <!-- Hex border on top for crisp edges -->
  <polygon points="90.5,0 181,52.25 181,156.75 90.5,209 0,156.75 0,52.25" fill="none" stroke="#264653" stroke-width="3"></polygon>
</svg></svg>